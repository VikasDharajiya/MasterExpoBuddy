<!-- HEADER -->
<div class="flex gap-3 items-center mb-6">
  <button
    pButton
    icon="pi pi-arrow-left"
    class="p-button-text border-blue-200!"
    (click)="goBack()"
  ></button>

  <h2 class="text-xl font-semibold text-gray-800">
    {{ isEditMode ? 'Edit Exhibitor' : 'Add Exhibitor' }}
  </h2>
</div>

<form [formGroup]="form" class="w-full space-y-6 bg-white p-6 rounded-lg shadow-md">
  <!-- BASIC INFO -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="text-sm font-medium text-gray-700">
        Name <span class="text-red-500">*</span>
      </label>
      <input pInputText type="text" formControlName="name" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Company Name</label>
      <input pInputText type="text" formControlName="companyName" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Email</label>
      <input pInputText type="email" formControlName="email" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Contact Person</label>
      <input pInputText type="text" formControlName="contactPerson" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Contact Number 1</label>
      <input pInputText type="tel" formControlName="contact1" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Contact Number 2</label>
      <input pInputText type="tel" formControlName="contact2" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Reference</label>
      <input pInputText type="text" formControlName="reference" class="w-full mt-1" />
    </div>
  </div>

  <!-- LOGO -->
  <div>
    <label class="text-sm font-medium text-gray-700">Exhibitor Logo</label>

    <div class="flex items-center gap-4 mt-2">
      <label class="cursor-pointer">
        <span class="p-button p-component p-button-outlined">
          <span class="p-button-label">Choose File</span>
        </span>
        <input type="file" accept="image/*" class="hidden" (change)="onLogoSelect($event)" />
      </label>

      <span class="text-sm text-gray-600">
        {{ logoFile?.name || 'No file chosen' }}
      </span>

      <!-- <img
        *ngIf="logoPreview"
        [src]="logoPreview"
        class="w-16 h-16 rounded-lg object-cover border"
      /> -->
    </div>
  </div>

  <!-- LIMITS -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div>
      <label class="text-sm font-medium text-gray-700">Staff Limit</label>
      <input pInputText type="number" formControlName="staffLimit" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Exhibition Limit</label>
      <input pInputText type="number" formControlName="exhibitionLimit" class="w-full mt-1" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Storage Limit</label>
      <input pInputText type="number" formControlName="storageLimit" class="w-full mt-1" />
    </div>
  </div>

  <!-- EXHIBITIONS -->
  <div>
    <label class="text-sm font-medium text-gray-700">Exhibitions</label>

    <p-autocomplete
      #exhibitionAC
      formControlName="exhibitionIds"
      [suggestions]="filteredExhibitions"
      (completeMethod)="filterExhibitions($event)"
      (focus)="onExhibitionInputClick()"
      (click)="onExhibitionInputClick()"
      (onSelect)="onExhibitionChange()"
      (onUnselect)="onExhibitionChange()"
      [multiple]="true"
      [dropdown]="true"
      field="name"
      placeholder="Search exhibitions..."
      class="w-full mt-1"
    >
      <ng-template let-exhibition #item>
        <div class="py-1 text-sm">{{ exhibition.name }}</div>
      </ng-template>

      <ng-template let-value #selecteditem>
        <span class="text-sm font-medium">{{ value?.name }}</span>
      </ng-template>
    </p-autocomplete>

    <p class="text-xs text-gray-500 mt-1">
      Selected: {{ form.value.exhibitionIds?.length || 0 }} /
      {{ form.value.exhibitionLimit || 0 }}
    </p>
  </div>

  <!-- COLORS -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="text-sm font-medium text-gray-700">Primary Color</label>
      <input type="color" formControlName="primaryColor" class="w-full mt-1 h-10" />
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">Secondary Color</label>
      <input type="color" formControlName="secondaryColor" class="w-full mt-1 h-10" />
    </div>
  </div>

  <!-- NOTES -->
  <div>
    <label class="text-sm font-medium text-gray-700">Notes</label>
    <p-editor formControlName="notes" [style]="{ height: '150px' }"></p-editor>
  </div>

  <!-- ACTIVE -->
  <div class="flex items-center gap-3">
    <label class="text-sm font-medium text-gray-700">Active</label>
    <p-toggleSwitch formControlName="isActive"></p-toggleSwitch>
  </div>

  <!-- BUTTONS -->
  <div class="flex gap-3 pt-4 border-t-2 border-gray-200">
    <button
      pButton
      type="button"
      [label]="isEditMode ? 'Update' : 'Add'"
      (click)="submit()"
    ></button>

    <button
      pButton
      type="button"
      label="Cancel"
      class="p-button-text border-blue-200!"
      (click)="goBack()"
    ></button>
  </div>
</form>

<app-toast />
