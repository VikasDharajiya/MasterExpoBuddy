<app-base-dialoge
  [visible]="visible"
  (visibleChange)="visibleChange.emit($event)"
  title="Change Password"
  subtitle="Enter current and new password to update."
  icon="pi pi-lock"
  submitLabel="Save"
  width="480px"
  (cancel)="onCancel()"
  (submit)="onSubmit()"
>
  <div class="space-y-4 py-1">
    <!-- Current Password -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">
        Current Password <span class="text-red-500">*</span>
      </label>
      <p-password
        [(ngModel)]="form.currentPassword"
        [feedback]="false"
        [toggleMask]="true"
        placeholder="Enter current password"
        styleClass="w-full"
        inputStyleClass="w-full text-sm"
      />
    </div>

    <!-- New Password -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">
        New Password <span class="text-red-500">*</span>
      </label>
      <p-password
        [(ngModel)]="form.newPassword"
        [feedback]="false"
        [toggleMask]="true"
        placeholder="Enter new password"
        styleClass="w-full"
        inputStyleClass="w-full text-sm"
        (ngModelChange)="checkStrength()"
      />
    </div>

    <!-- Confirm Password -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">
        Confirm New Password <span class="text-red-500">*</span>
      </label>
      <p-password
        [(ngModel)]="form.confirmPassword"
        [feedback]="false"
        [toggleMask]="true"
        placeholder="Enter confirm password"
        styleClass="w-full"
        inputStyleClass="w-full text-sm"
      />
    </div>

    <!-- Password rules -->
    <div class="space-y-1.5 pt-1">
      <p class="text-xs text-gray-500">Must contain at least:</p>
      @for (rule of rules; track rule.label) {
        <div class="flex items-center gap-2">
          <i
            class="pi text-xs"
            [class.pi-check-circle]="rule.valid"
            [class.pi-circle]="!rule.valid"
            [class.text-green-500]="rule.valid"
            [class.text-gray-300]="!rule.valid"
          ></i>
          <span
            class="text-xs"
            [class.text-gray-400]="!rule.valid"
            [class.text-gray-700]="rule.valid"
          >
            {{ rule.label }}
          </span>
        </div>
      }
    </div>
  </div>
</app-base-dialoge>
