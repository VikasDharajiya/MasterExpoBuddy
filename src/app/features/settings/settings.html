<div class="flex gap-0 bg-white rounded-xl shadow-md overflow-hidden min-h-[calc(100vh-7rem)]">
  <!-- LEFT NAV -->
  <aside class="w-64 shrink-0 border-r-2 border-gray-100 p-4">
    <p class="text-xs text-gray-400 uppercase tracking-wider font-semibold mb-3 px-2">
      Select Menu
    </p>
    <nav class="space-y-1">
      @for (item of menuItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="settings-menu-active"
          class="flex items-center justify-between gap-3 px-2.5 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all duration-150 cursor-pointer group"
        >
          <div class="flex items-center gap-3">
            <i [class]="item.icon"></i>
            <span class="text-sm font-medium">{{ item.label }}</span>
          </div>
          <i
            class="pi pi-angle-right bg-white rounded-full p-1 opacity-0 -translate-x-4 transition-all duration-200"
          ></i>
        </a>
      }
    </nav>
  </aside>

  <!-- RIGHT CONTENT -->
  <div class="flex-1 p-6 overflow-y-auto">
    <router-outlet></router-outlet>
  </div>
</div>
