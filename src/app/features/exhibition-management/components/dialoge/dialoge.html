<app-base-dialoge
  [(visible)]="visible"
  (visibleChange)="visibleChange.emit($event)"
  [title]="editMode ? 'Edit Staff' : 'Add Staff'"
  [subtitle]="
    editMode ? 'Edit below details for a staff.' : 'Enter below details to add new staff.'
  "
  icon="pi pi-user"
  [submitLabel]="editMode ? 'Save' : 'Add'"
  width="440px"
  (cancel)="onClose()"
  (submit)="onSave()"
>
  <div class="space-y-2">
    <!-- Profile Image -->
    <div class="flex items-center gap-4">
      <div
        class="w-16 h-16 rounded-full bg-gray-100 overflow-hidden flex items-center justify-center shrink-0"
      >
        @if (previewUrl) {
          <img [src]="previewUrl" alt="Profile" class="w-full h-full object-cover" />
        } @else {
          <i class="pi pi-user text-gray-400 text-2xl!"></i>
        }
      </div>
      <div>
        <p class="text-sm font-medium text-gray-700">Profile Image</p>
        <p class="text-xs text-gray-400 mb-2">Min 400x400px, PNG or JPEG</p>
        <div class="flex gap-2">
          <button
            pButton
            [label]="editMode && previewUrl ? 'Edit' : 'Upload'"
            class="p-button-outlined p-button-sm text-xs border-gray-300! text-gray-600! bg-white! hover:bg-gray-50! py-1! px-3!"
            (click)="fileInput.click()"
          ></button>
          @if (editMode && previewUrl) {
            <button
              pButton
              label="Remove"
              class="p-button-outlined p-button-sm text-xs border-red-300! text-red-500! bg-white! hover:bg-red-50! py-1! px-3!"
              (click)="removeImage()"
            ></button>
          }
        </div>
        <input
          #fileInput
          type="file"
          accept="image/*"
          class="hidden"
          (change)="onFileSelected($event)"
        />
      </div>
    </div>

    <!-- Full Name -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">
        Full Name <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        [(ngModel)]="form.name"
        placeholder="Enter full name"
        class="w-full text-sm"
      />
    </div>

    <!-- Email -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">
        Email <span class="text-red-500">*</span>
      </label>
      <input
        pInputText
        type="email"
        [(ngModel)]="form.email"
        placeholder="Enter email address"
        class="w-full text-sm"
      />
    </div>

    <!-- Mobile -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">
        Mobile Number <span class="text-red-500">*</span>
      </label>
      <p-inputgroup>
        <p-inputgroup-addon class="p-0!">
          <p-select
            [options]="countryOptions"
            [(ngModel)]="selectedCountry"
            optionLabel="name"
            appendTo="body"
            styleClass="border-0! shadow-none! bg-transparent! w-28"
          >
            <ng-template pTemplate="selectedItem" let-c>
              <span class="text-sm">{{ c.flag }} {{ c.dial }}</span>
            </ng-template>
            <ng-template pTemplate="item" let-c>
              <span class="text-sm">{{ c.flag }} {{ c.name }} ({{ c.dial }})</span>
            </ng-template>
          </p-select>
        </p-inputgroup-addon>
        <input pInputText [(ngModel)]="form.mobile" placeholder="(555) 000-0000" class="text-sm" />
      </p-inputgroup>
    </div>

    <!-- EXHIBITION -->
    <div class="space-y-1">
      <label class="block text-sm font-medium text-gray-700">Assign Exhibition</label>

      <p-select
        [options]="exhibitions"
        optionLabel="name"
        optionValue="id"
        [(ngModel)]="form.exhibitionId"
        (onChange)="onExhibitionSelect($event)"
        class="w-full mt-1"
      ></p-select>
    </div>

    <!-- Status (edit mode only) -->
    @if (editMode) {
      <div class="space-y-1">
        <label class="block text-sm font-medium text-gray-700">Status</label>
        <p-select
          [options]="statusOptions"
          [(ngModel)]="form.status"
          optionLabel="label"
          optionValue="value"
          styleClass="w-full text-sm"
        />
      </div>
    }

    <!-- Password (edit mode only) -->
    @if (editMode) {
      <div class="space-y-1">
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <p-password
          [(ngModel)]="form.password"
          [feedback]="false"
          [toggleMask]="true"
          styleClass="w-full"
          inputStyleClass="w-full text-sm"
        />
      </div>
    }
  </div>
</app-base-dialoge>
