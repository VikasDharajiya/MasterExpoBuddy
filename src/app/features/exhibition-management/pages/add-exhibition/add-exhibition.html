<div class="flex gap-3 items-center mb-6">
  <button
    pButton
    icon="pi pi-arrow-left"
    class="p-button-text border-blue-200!"
    (click)="goBack()"
  ></button>

  <h2 class="text-xl font-semibold text-gray-800">
    {{ isEditMode ? 'Edit Exhibition' : 'Add exhibition' }}
  </h2>
</div>

<form [formGroup]="form" class="w-full space-y-6 bg-white p-6 rounded-lg shadow-md">
  <!-- BASIC INFO -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <!-- Name -->
    <div>
      <label class="text-sm font-medium text-gray-700">
        Name <span class="text-red-500">*</span>
      </label>
      <input pInputText formControlName="name" class="w-full mt-1" />
    </div>

    <!-- Organization -->
    <div>
      <label class="text-sm font-medium text-gray-700">Organization Name</label>
      <input pInputText formControlName="organizationName" class="w-full mt-1" />
    </div>
  </div>

  <!-- LOGO -->
  <div>
    <label class="text-sm font-medium text-gray-700">Logo</label>

    <div class="flex items-center gap-4 mt-2">
      <label class="cursor-pointer">
        <span class="p-button p-component p-button-outlined">
          <span class="p-button-label">Choose File</span>
        </span>
        <input type="file" accept="image/*" class="hidden" (change)="onLogoSelect($event)" />
      </label>

      <span class="text-sm text-gray-600">
        {{ logoFile?.name || 'No file chosen' }}
      </span>

      <!-- preview -->
      <!-- <img
        *ngIf="logoPreview"
        [src]="logoPreview"
        class="w-16 h-16 rounded-lg object-cover border"
      /> -->
    </div>
  </div>

  <!-- DATES -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="text-sm font-medium text-gray-700">
        Start Date <span class="text-red-500">*</span>
      </label>
      <p-datepicker formControlName="startDate" class="w-full mt-1"></p-datepicker>
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">
        End Date <span class="text-red-500">*</span>
      </label>
      <p-datepicker formControlName="endDate" class="w-full mt-1"></p-datepicker>
    </div>
  </div>

  <!-- LOCATION -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- Country -->
    <div>
      <label class="text-sm font-medium text-gray-700">
        Country <span class="text-red-500">*</span>
      </label>
      <p-select
        [options]="countries"
        optionLabel="name"
        formControlName="country"
        placeholder="Select Country"
        class="w-full mt-1"
      ></p-select>
    </div>

    <!-- State -->
    <div>
      <label class="text-sm font-medium text-gray-700">
        State <span class="text-red-500">*</span>
      </label>
      <p-select
        [options]="states"
        optionLabel="name"
        formControlName="state"
        placeholder="Select State"
        class="w-full mt-1"
      ></p-select>
    </div>

    <!-- City -->
    <div>
      <label class="text-sm font-medium text-gray-700">
        City <span class="text-red-500">*</span>
      </label>
      <p-select
        [options]="cities"
        optionLabel="name"
        formControlName="city"
        placeholder="Select City"
        class="w-full mt-1"
      ></p-select>
    </div>
  </div>

  <!-- ADDRESS -->
  <div>
    <label class="text-sm font-medium text-gray-700">
      Address <span class="text-red-500">*</span>
    </label>
    <input pInputText formControlName="address" class="w-full mt-1" />
  </div>

  <!-- MAP LINK -->
  <div>
    <label class="text-sm font-medium text-gray-700">Map Link</label>
    <input pInputText formControlName="mapLink" class="w-full mt-1" />
  </div>

  <!-- ACTIVE -->
  <div class="flex items-center gap-3">
    <label class="text-sm font-medium text-gray-700">
      Active <span class="text-red-500">*</span>
    </label>
    <p-toggleSwitch formControlName="isActive"></p-toggleSwitch>
  </div>

  <!-- NOTES (TEXT EDITOR) -->
  <div>
    <label class="text-sm font-medium text-gray-700">Notes</label>
    <p-editor formControlName="notes" [style]="{ height: '150px' }"></p-editor>
  </div>

  <!-- BUTTONS -->
  <div class="flex gap-3 pt-4 border-t-2 border-gray-200">
    <button
      pButton
      type="button"
      [label]="isEditMode ? 'Update' : 'Add'"
      (click)="submit()"
    ></button>

    <button
      pButton
      type="button"
      label="Cancel"
      class="p-button-text border-blue-200!"
      (click)="goBack()"
    ></button>
  </div>
</form>

<app-toast />
