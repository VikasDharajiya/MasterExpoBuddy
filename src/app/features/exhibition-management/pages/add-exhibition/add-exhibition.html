<!-- HEADER  -->
<div class="flex gap-3 items-center mb-6">
  <button
    pButton
    icon="pi pi-arrow-left"
    class="p-button-text border-blue-200!"
    (click)="goBack()"
  ></button>

  <h2 class="text-xl font-semibold text-gray-800">
    {{ isEditMode ? 'Edit Exhibition' : 'Add Exhibition' }}
  </h2>

  <div></div>
</div>

<!-- FORM (FULL WIDTH) -->
<form [formGroup]="form" class="w-full space-y-6 bg-white p-6 rounded-lg shadow-md">
  <!-- Name -->
  <div>
    <label class="text-sm font-medium text-gray-700">Name</label>
    <input pInputText formControlName="name" class="w-full mt-1" />
  </div>

  <!-- LOGO  -->
  <div>
    <label class="text-sm font-medium text-gray-700">Logo</label>

    <div class="flex items-center gap-4 mt-2">
      <!-- Custom File Input -->
      <label class="cursor-pointer">
        <span class="p-button p-component p-button-outlined">
          <span class="p-button-label">Choose File</span>
        </span>
        <input type="file" accept="image/*" class="hidden" (change)="onLogoSelect($event)" />
      </label>

      <!-- File Name -->
      <span class="text-sm text-gray-600">
        {{ logoFile?.name || 'No file chosen' }}
      </span>

      <!-- Preview -->
      <!-- <img
        *ngIf="logoPreview"
        [src]="logoPreview"
        class="w-16 h-16 rounded-lg object-cover border"
      /> -->
    </div>
  </div>

  <!-- DATES -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div>
      <label class="text-sm font-medium text-gray-700">Start Date</label>
      <p-datepicker formControlName="startDate" class="w-full mt-1"></p-datepicker>
    </div>

    <div>
      <label class="text-sm font-medium text-gray-700">End Date</label>
      <p-datepicker formControlName="endDate" class="w-full mt-1"></p-datepicker>
    </div>
  </div>

  <!-- LOCATION -->
  <div>
    <label class="text-sm font-medium text-gray-700">Location</label>
    <input pInputText formControlName="location" class="w-full mt-1" />
  </div>

  <div class="flex items-center gap-3">
    <label class="text-sm font-medium text-gray-700">Active</label>
    <p-toggleSwitch formControlName="isActive"></p-toggleSwitch>
  </div>

  <!-- BUTTONS -->
  <div class="flex gap-3 pt-4 border-t-2 border-gray-200">
    <button
      pButton
      type="button"
      [label]="isEditMode ? 'Update' : 'Add'"
      (click)="submit()"
    ></button>
    <button
      pButton
      type="button"
      label="Cancel"
      class="p-button-text border-blue-200!"
      (click)="goBack()"
    ></button>
  </div>
</form>

<app-toast />
