<aside
  class="sidebar flex flex-col h-screen bg-white border-r border-gray-100 shadow-sm transition-all duration-300 ease-in-out z-20"
  [class.w-56]="!collapsed"
  [class.w-16]="collapsed"
>
  <!-- Logo + Collapse toggle -->
  <div class="flex items-center justify-between px-2 py-4 border-b-2 border-gray-100 h-[65.5px]">
    <div class="flex items-center justify-center shrink-0">
      <img
        [class.size-12]="!collapsed"
        [class.size-8]="collapsed"
        src="/assets/images/logo.png"
        alt="logo image"
      />
    </div>

    <button
      (click)="toggleSidebar()"
      pRipple
      class="flex items-center justify-center p-1.5 text-gray-400 hover:text-gray-700 rounded-full hover:bg-gray-100 transition-colors shrink-0"
      [pTooltip]="collapsed ? 'Expand' : 'Collapse'"
      tooltipPosition="right"
    >
      <!-- <img src="assets/images/collaps.png" alt="collapsed icon" /> -->
      <i [class]="collapsed ? 'pi pi-angle-right ' : 'pi pi-angle-left '"></i>
    </button>
  </div>

  <!-- Main nav -->
  <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="nav-active"
        pRipple
        class="flex items-center gap-3 px-2.5 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all duration-150 cursor-pointer group"
        [class.justify-center]="collapsed"
        [pTooltip]="collapsed ? item.label : ''"
        tooltipPosition="right"
      >
        <i [class]="item.icon + ' w-5 text-center shrink-0'"></i>
        @if (!collapsed) {
          <span class="whitespace-nowrap truncate font-medium">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- Bottom items -->
  <div class="px-2 py-2 space-y-0.5">
    @for (item of bottomItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="nav-active"
        pRipple
        class="nav-link flex items-center gap-3 px-2.5 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all duration-150 cursor-pointer group"
        [class.justify-center]="collapsed"
        [pTooltip]="collapsed ? item.label : ''"
        tooltipPosition="right"
      >
        <i [class]="item.icon + ' w-5 text-center shrink-0'"></i>
        @if (!collapsed) {
          <span class="flex-1 font-medium">{{ item.label }}</span>
        } @else {
          <!-- <span
            class="absolute top-1.5 left-6 w-4 h-4 text-white text-[9px] font-bold rounded-full flex items-center justify-center"
            [class.bg-red-500]="item.badge"
            >{{ item.badge }}</span
          > -->
        }
      </a>
    }
  </div>
  <hr class="text-gray-200 w-[90%] mx-auto" />
  <!-- User profile -->
  <div class="px-2 py-3">
    <div
      class="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-gray-50 transition-colors cursor-pointer"
      [pTooltip]="collapsed ? currentUser.name : ''"
      tooltipPosition="right"
    >
      <img
        [src]="currentUser.avatar"
        [alt]="currentUser.name"
        class="w-8 h-8 rounded-full object-cover shrink-0 ring-2 ring-gray-200"
      />
      @if (!collapsed) {
        <div class="flex-1 min-w-0">
          <p class="text-xs font-semibold text-gray-800 truncate">{{ currentUser.name }}</p>
          <p class="text-[10px] text-gray-400 truncate">{{ currentUser.email }}</p>
        </div>
      }

      @if (!collapsed) {
        <button
          (click)="logout()"
          pRipple
          class="p-1 rounded text-gray-400 hover:text-gray-700 transition-colors"
          pTooltip="Logout"
          tooltipPosition="top"
        >
          <i class="pi pi-sign-out"></i>
        </button>
      }
    </div>
  </div>
</aside>
