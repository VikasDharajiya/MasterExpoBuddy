<div
  class="bg-white border-b-2 border-gray-100 px-6 py-3.5 flex items-center justify-between gap-4 sticky top-0 z-10"
>
  <!-- Left -->
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-full bg-blue-50 flex items-center justify-center">
      <i [class]="(headerService.icon$ | async) + ' text-blue-600'"></i>
    </div>

    <div>
      <h1 class="text-base font-semibold text-gray-900 leading-tight">
        {{ headerService.title$ | async }}
      </h1>
      <p class="text-xs text-gray-400">
        {{ headerService.subtitle$ | async }}
      </p>
    </div>
  </div>

  <!-- Right -->
  <div class="flex items-center gap-2.5 flex-wrap">
    <p-select
      [options]="exhibitions"
      [(ngModel)]="selectedExhibition"
      optionLabel="label"
      optionValue="value"
    ></p-select>
  </div>
</div>
