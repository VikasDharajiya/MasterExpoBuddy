<p-confirmDialog>
  <ng-template pTemplate="message" let-message>
    <div class="flex flex-col items-center gap-2 w-full">
      <i
        class="pi pi-exclamation-triangle px-3 py-2 bg-red-50 rounded-lg text-orange-400 mb-2 text-2xl!"
      ></i>
      <span class="text-base font-semibold text-gray-800">{{ message.header }}</span>
      <span class="text-sm text-gray-500 text-center">{{ message.message }}</span>
    </div>
  </ng-template>
</p-confirmDialog>
